services:
  - type: web
    name: flood-kenya-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        value: https://fllvgstxyxnoccdtwame.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false   # set manually in Render dashboard (secret)
      - key: TELEGRAM_BOT_TOKEN
        sync: false   # set manually
      - key: MINI_APP_URL
        sync: false   # set to https://YOUR-APP.onrender.com/miniapp after first deploy
      - key: ALLOWED_ORIGINS
        value: "*"
